name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check connection to OpenWeather API
        run: npm test test/clientFunctions/getWeatherData.int.test.ts
      - name: Check connection to BigDataCloud API
        run: npm test test/clientFunctions/getCityName.int.test.ts
